name: CI Pipeline

on:
  push:
    branches: [dev, main]
  pull_request:
    branches: [dev, main]

env:
  NODE_VERSION: '22'

jobs:
  detect-changes:
    name: Detect Changes
    runs-on: ubuntu-latest
    outputs:
      backend: ${{ steps.changes.outputs.backend }}
      frontend-web: ${{ steps.changes.outputs.frontend-web }}
      frontend-mobile: ${{ steps.changes.outputs.frontend-mobile }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: changes
        with:
          filters: |
            backend:
              - 'backend/**'
            frontend-web:
              - 'frontend/web/**'
            frontend-mobile:
              - 'frontend/mobile/**'

  backend-lint:
    name: Backend Lint
    needs: detect-changes
    if: needs.detect-changes.outputs.backend == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: ./backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: ./backend/package-lock.json
      - run: npm ci
      - run: npm run lint

  frontend-web-lint:
    name: Frontend Web Lint
    needs: detect-changes
    if: needs.detect-changes.outputs.frontend-web == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: ./frontend/web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: ./frontend/web/package-lock.json
      - run: npm install --legacy-peer-deps
      - run: npm run lint

  frontend-mobile-lint:
    name: Frontend Mobile Lint
    needs: detect-changes
    if: needs.detect-changes.outputs.frontend-mobile == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: ./frontend/mobile
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: ./frontend/mobile/package-lock.json
      - run: npm install --legacy-peer-deps
      - run: npm run lint

  backend-test:
    name: Backend Tests
    needs: [detect-changes, backend-lint]
    if: needs.detect-changes.outputs.backend == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: ./backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: ./backend/package-lock.json
      - run: npm ci
      - run: npm test

  frontend-web-test:
    name: Frontend Web Tests
    needs: [detect-changes, frontend-web-lint]
    if: needs.detect-changes.outputs.frontend-web == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: ./frontend/web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: ./frontend/web/package-lock.json
      - run: npm install --legacy-peer-deps
      - run: npm test

  frontend-mobile-test:
    name: Frontend Mobile Tests
    needs: [detect-changes, frontend-mobile-lint]
    if: needs.detect-changes.outputs.frontend-mobile == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: ./frontend/mobile
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: ./frontend/mobile/package-lock.json
      - run: npm install --legacy-peer-deps
      - run: npm test
