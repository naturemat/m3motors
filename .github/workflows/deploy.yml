name: Deploy to DigitalOcean

on:
  push:
    branches: [main]

permissions:
  contents: read

env:
  DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
  DO_HOST: ${{ secrets.DO_HOST }}
  DO_USERNAME: ${{ secrets.DO_USERNAME }}
  DEPLOY_PATH: /opt/m3motors

jobs:
  detect-changes:
    name: Detect Changes
    runs-on: ubuntu-latest
    outputs:
      backend: ${{ steps.changes.outputs.backend }}
      frontend-web: ${{ steps.changes.outputs.frontend-web }}
      frontend-mobile: ${{ steps.changes.outputs.frontend-mobile }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: changes
        with:
          filters: |
            backend:
              - 'backend/**'
            frontend-web:
              - 'frontend/src/**'
              - 'frontend/public/**'
              - 'frontend/package.json'
              - 'frontend/package-lock.json'
              - 'frontend/tailwind.config.js'
              - 'frontend/vite.config.*'
              - 'frontend/tsconfig.*'
              - 'frontend/Dockerfile'
              - 'frontend/nginx.conf'
            frontend-mobile:
              - 'frontend/mobile/**'

  # ===========================================================================
  # BACKEND — Docker build + push
  # ===========================================================================
  build-backend:
    name: Build Backend
    needs: detect-changes
    if: needs.detect-changes.outputs.backend == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: true
          tags: ${{ env.DOCKERHUB_USERNAME }}/m3motors-backend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ===========================================================================
  # FRONTEND WEB — Docker build + push (nginx)
  # ===========================================================================
  build-frontend-web:
    name: Build Frontend Web
    needs: detect-changes
    if: needs.detect-changes.outputs.frontend-web == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: true
          tags: ${{ env.DOCKERHUB_USERNAME }}/m3motors-frontend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ===========================================================================
  # FRONTEND MOBILE — Build APK
  # ===========================================================================
  build-frontend-mobile:
    name: Build Frontend Mobile (APK)
    needs: detect-changes
    if: needs.detect-changes.outputs.frontend-mobile == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./frontend/mobile
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: ./frontend/mobile/package-lock.json

      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Generate android project if missing
        run: |
          if [ ! -d "android" ]; then
            echo "=== android/ not found, generating ==="
            cd /tmp
            npx @react-native-community/cli@20.1.0 init M3MotorsMobile --directory ./m3motors-mobile-tmp --skip-install --skip-git-init --version 0.86.0
            cp -r /tmp/m3motors-mobile-tmp/android "$GITHUB_WORKSPACE/frontend/mobile/android"
            rm -rf /tmp/m3motors-mobile-tmp
            echo "=== android/ generated ==="
          fi

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Accept Android SDK licenses
        run: yes | sdkmanager --licenses || true

      - name: Build APK (Release)
        run: |
          cd android
          ./gradlew assembleRelease --no-daemon

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: m3motors-mobile-apk
          path: frontend/mobile/android/app/build/outputs/apk/release/*.apk
          retention-days: 30

  # ===========================================================================
  # DEPLOY — SSH to DigitalOcean Droplet
  # ===========================================================================
  deploy:
    name: Deploy to Droplet
    needs: [detect-changes, build-backend, build-frontend-web, build-frontend-mobile]
    if: always() && needs.build-backend.result != 'failure' && needs.build-frontend-web.result != 'failure' && (needs.build-backend.result == 'success' || needs.build-frontend-web.result == 'success')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.DO_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H ${{ env.DO_HOST }} >> ~/.ssh/known_hosts 2>/dev/null

      - name: Clone/actualizar repo en Droplet
        run: |
          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no ${{ env.DO_USERNAME }}@${{ env.DO_HOST }} <<'CLONE_SCRIPT'
          set -e
          cd /opt

          if [ -d "m3motors/.git" ]; then
            echo "=== Repo existe, haciendo pull ==="
            cd m3motors
            git fetch origin main
            git reset --hard origin/main
            git clean -fd
          else
            echo "=== Clonando repo por primera vez ==="
            rm -rf m3motors
            git clone --branch main https://github.com/naturemat/m3motors.git
            cd m3motors
          fi

          echo "=== Repo actualizado ==="
          git log -1 --oneline
          CLONE_SCRIPT

      - name: Create .env en Droplet
        run: |
          ssh -i ~/.ssh/deploy_key ${{ env.DO_USERNAME }}@${{ env.DO_HOST }} "cat > ${{ env.DEPLOY_PATH }}/.env" <<'ENVEOF'
          DOCKERHUB_USERNAME=${{ secrets.DOCKERHUB_USERNAME }}
          APP_PORT=3000
          NODE_ENV=production
          DATABASE_URL=${{ secrets.DATABASE_URL }}
          CLERK_SECRET_KEY=${{ secrets.CLERK_SECRET_KEY }}
          CLERK_ISSUER_URL=${{ secrets.CLERK_ISSUER_URL }}
          CLERK_WEBHOOK_SECRET=${{ secrets.CLERK_WEBHOOK_SECRET }}
          JWT_SECRET=${{ secrets.JWT_SECRET }}
          JWT_EXPIRES_IN=${{ secrets.JWT_EXPIRES_IN }}
          LLM_API_KEY=${{ secrets.LLM_API_KEY }}
          LLM_MODEL=${{ secrets.LLM_MODEL }}
          GEMINI_API_KEY=${{ secrets.GEMINI_API_KEY }}
          GROQ_API_KEY=${{ secrets.GROQ_API_KEY }}
          RESEND_API_KEY=${{ secrets.RESEND_API_KEY }}
          RESEND_FROM_EMAIL=${{ secrets.RESEND_FROM_EMAIL }}
          ONESIGNAL_APP_ID=${{ secrets.ONESIGNAL_APP_ID }}
          ONESIGNAL_REST_API_KEY=${{ secrets.ONESIGNAL_REST_API_KEY }}
          REDIS_HOST=redis
          REDIS_PORT=${{ secrets.REDIS_PORT }}
          NOTIFICATION_ENABLED=true
          NOTIFICATION_MAX_RETRIES=3
          NOTIFICATION_RETRY_DELAY_MS=5000
          LOG_LEVEL=${{ secrets.LOG_LEVEL }}
          CORS_ORIGIN=${{ secrets.CORS_ORIGIN }}
          ENVEOF

      - name: Deploy via SSH
        run: |
          ssh -i ~/.ssh/deploy_key ${{ env.DO_USERNAME }}@${{ env.DO_HOST }} <<'DEPLOY_SCRIPT'
          set -e
          cd /opt/m3motors

          echo "=== [1/5] Limpiar contenedores viejos ==="
          docker stop $(docker ps -aq --filter "name=m3motors-") 2>/dev/null || true
          docker rm $(docker ps -aq --filter "name=m3motors-") 2>/dev/null || true

          echo "=== [2/5] Limpiar imagenes no utilizadas ==="
          docker image prune -af --filter "until=72h" 2>/dev/null || true

          echo "=== [3/5] Limpiar logs antiguos de contenedores ==="
          find /var/lib/docker/containers -name "*-json.log" -size +50M -delete 2>/dev/null || true

          echo "=== [4/5] Descargar e iniciar servicios ==="
          docker compose -f docker-compose.prod.yml --env-file .env pull
          docker compose -f docker-compose.prod.yml --env-file .env up -d

          echo "=== [5/5] Verificar estado ==="
          sleep 10
          docker compose -f docker-compose.prod.yml ps

          echo "=== Deploy completado ==="
          DEPLOY_SCRIPT

      - name: Download APK artifact
        if: needs.build-frontend-mobile.result == 'success'
        uses: actions/download-artifact@v4
        with:
          name: m3motors-mobile-apk
          path: ./apk

      - name: Upload APK to Droplet
        if: needs.build-frontend-mobile.result == 'success'
        run: |
          ssh -i ~/.ssh/deploy_key ${{ env.DO_USERNAME }}@${{ env.DO_HOST }} "mkdir -p ${{ env.DEPLOY_PATH }}/apk"
          scp -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no ./apk/*.apk ${{ env.DO_USERNAME }}@${{ env.DO_HOST }}:${{ env.DEPLOY_PATH }}/apk/

      - name: Cleanup SSH key
        if: always()
        run: rm -rf ~/.ssh/deploy_key
