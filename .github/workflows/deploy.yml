name: Deploy to DigitalOcean

on:
  push:
    branches: [main]

permissions:
  contents: read

env:
  DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
  DO_HOST: ${{ secrets.DO_HOST }}
  DO_USERNAME: ${{ secrets.DO_USERNAME }}
  DEPLOY_PATH: /opt/m3motors

jobs:
  detect-changes:
    name: Detect Changes
    runs-on: ubuntu-latest
    outputs:
      backend: ${{ steps.changes.outputs.backend }}
      frontend: ${{ steps.changes.outputs.frontend }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: changes
        with:
          filters: |
            backend:
              - 'backend/**'
            frontend:
              - 'frontend/**'

  build-backend:
    name: Build Backend
    needs: detect-changes
    if: needs.detect-changes.outputs.backend == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - uses: docker/build-push-action@v6
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: true
          tags: ${{ env.DOCKERHUB_USERNAME }}/m3motors-backend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  build-frontend:
    name: Build Frontend
    needs: detect-changes
    if: needs.detect-changes.outputs.frontend == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - uses: docker/build-push-action@v6
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: true
          tags: ${{ env.DOCKERHUB_USERNAME }}/m3motors-frontend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Deploy to Droplet
    needs: [detect-changes, build-backend, build-frontend]
    if: always() && needs.build-backend.result != 'failure' && needs.build-frontend.result != 'failure' && (needs.build-backend.result == 'success' || needs.build-frontend.result == 'success')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.DO_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H ${{ env.DO_HOST }} >> ~/.ssh/known_hosts 2>/dev/null

      - name: Create docker-compose.prod.yml on Droplet
        run: |
          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no ${{ env.DO_USERNAME }}@${{ env.DO_HOST }} "mkdir -p ${{ env.DEPLOY_PATH }}"
          cat docker-compose.prod.yml | ssh -i ~/.ssh/deploy_key ${{ env.DO_USERNAME }}@${{ env.DO_HOST }} "cat > ${{ env.DEPLOY_PATH }}/docker-compose.prod.yml"

      - name: Create .env on Droplet
        run: |
          ssh -i ~/.ssh/deploy_key ${{ env.DO_USERNAME }}@${{ env.DO_HOST }} "cat > ${{ env.DEPLOY_PATH }}/.env" <<'ENVEOF'
          DATABASE_URL=${{ secrets.DATABASE_URL }}
          JWT_SECRET=${{ secrets.JWT_SECRET }}
          JWT_EXPIRES_IN=${{ secrets.JWT_EXPIRES_IN }}
          LLM_API_KEY=${{ secrets.LLM_API_KEY }}
          LLM_MODEL=${{ secrets.LLM_MODEL }}
          GEMINI_API_KEY=${{ secrets.GEMINI_API_KEY }}
          GROQ_API_KEY=${{ secrets.GROQ_API_KEY }}
          RESEND_API_KEY=${{ secrets.RESEND_API_KEY }}
          RESEND_FROM_EMAIL=${{ secrets.RESEND_FROM_EMAIL }}
          ONESIGNAL_APP_ID=${{ secrets.ONESIGNAL_APP_ID }}
          ONESIGNAL_REST_API_KEY=${{ secrets.ONESIGNAL_REST_API_KEY }}
          TELEGRAM_BOT_TOKEN=${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_BOT_USERNAME=${{ secrets.TELEGRAM_BOT_USERNAME }}
          NOTIFICATION_ENABLED=true
          NOTIFICATION_MAX_RETRIES=3
          NOTIFICATION_RETRY_DELAY_MS=5000
          LOG_LEVEL=${{ secrets.LOG_LEVEL }}
          CORS_ORIGIN=${{ secrets.CORS_ORIGIN }}
          DOCKERHUB_USERNAME=${{ env.DOCKERHUB_USERNAME }}
          ENVEOF

      - name: Deploy via SSH
        run: |
          ssh -i ~/.ssh/deploy_key ${{ env.DO_USERNAME }}@${{ env.DO_HOST }} <<'DEPLOY_SCRIPT'
          set -e
          cd /opt/m3motors

          echo "=== [1/4] Limpiar contenedores viejos ==="
          docker stop $(docker ps -aq --filter "name=m3motors-") 2>/dev/null || true
          docker rm $(docker ps -aq --filter "name=m3motors-") 2>/dev/null || true

          echo "=== [2/4] Limpiar imagenes no utilizadas ==="
          docker image prune -af --filter "until=72h" 2>/dev/null || true

          echo "=== [3/4] Descargar e iniciar servicios ==="
          docker compose -f docker-compose.prod.yml pull
          docker compose -f docker-compose.prod.yml up -d

          echo "=== [4/4] Verificar estado ==="
          sleep 10
          docker compose -f docker-compose.prod.yml ps

          echo "=== Deploy completado ==="
          DEPLOY_SCRIPT

      - name: Cleanup SSH key
        if: always()
        run: rm -rf ~/.ssh/deploy_key
