name: Deploy to DigitalOcean

on:
  push:
    branches: [main]

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
  DO_HOST: ${{ secrets.DO_HOST }}
  DO_USERNAME: ${{ secrets.DO_USERNAME }}
  DEPLOY_PATH: /opt/m3motors

jobs:
  detect-changes:
    name: Detect Changes
    runs-on: ubuntu-latest
    outputs:
      backend: ${{ steps.changes.outputs.backend }}
      frontend-web: ${{ steps.changes.outputs.frontend-web }}
      frontend-mobile: ${{ steps.changes.outputs.frontend-mobile }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: changes
        with:
          filters: |
            backend:
              - 'backend/**'
            frontend-web:
              - 'frontend/web/**'
            frontend-mobile:
              - 'frontend/mobile/**'

  # ===========================================================================
  # BACKEND — Docker build + push
  # ===========================================================================
  build-backend:
    name: Build Backend
    needs: detect-changes
    if: needs.detect-changes.outputs.backend == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: true
          tags: ${{ env.DOCKERHUB_USERNAME }}/m3motors-backend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ===========================================================================
  # FRONTEND WEB — Docker build + push (nginx)
  # ===========================================================================
  build-frontend-web:
    name: Build Frontend Web
    needs: detect-changes
    if: needs.detect-changes.outputs.frontend-web == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: ./frontend/web
          file: ./frontend/web/Dockerfile
          push: true
          tags: ${{ env.DOCKERHUB_USERNAME }}/m3motors-frontend:latest
          build-args: |
            VITE_CLERK_PUBLISHABLE_KEY=${{ secrets.VITE_CLERK_PUBLISHABLE_KEY }}
            VITE_API_URL=${{ secrets.VITE_API_URL }}
            VITE_RECAPTCHA_SITE_KEY=${{ secrets.VITE_RECAPTCHA_SITE_KEY }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ===========================================================================
  # FRONTEND MOBILE — Build APK via EAS
  # ===========================================================================
  build-frontend-mobile:
    name: Build Frontend Mobile (APK)
    needs: detect-changes
    runs-on: ubuntu-latest
    timeout-minutes: 20
    defaults:
      run:
        working-directory: ./frontend/mobile
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: ./frontend/mobile/package-lock.json

      - name: Install EAS CLI
        run: npm install -g eas-cli

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Configure EAS project
        run: eas init --non-interactive --force
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}

      - name: Build APK (Preview)
        run: eas build -p android --profile preview --non-interactive
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}

      - name: Download APK from EAS
        if: success()
        run: |
          eas build:list --limit 1 --platform android --json > build-info.json
          BUILD_ID=$(node -e "const b=JSON.parse(require('fs').readFileSync('build-info.json','utf8')); console.log(b[0].id)")
          eas build:download --id $BUILD_ID
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}

      - name: Upload APK artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: m3motors-mobile-apk
          path: ./frontend/mobile/apk/*.apk
          retention-days: 30

  # ===========================================================================
  # DEPLOY — SSH to DigitalOcean Droplet
  # ===========================================================================
  deploy:
    name: Deploy to Droplet
    needs: [detect-changes, build-backend, build-frontend-web, build-frontend-mobile]
    if: always() && needs.build-backend.result != 'failure' && needs.build-frontend-web.result != 'failure' && (needs.build-backend.result == 'success' || needs.build-frontend-web.result == 'success')
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.DO_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H ${{ env.DO_HOST }} >> ~/.ssh/known_hosts 2>/dev/null

      - name: Clone/actualizar repo en Droplet
        run: |
          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no ${{ env.DO_USERNAME }}@${{ env.DO_HOST }} <<'CLONE_SCRIPT'
          set -e
          cd /opt

          if [ -d "m3motors/.git" ]; then
            echo "=== Repo existe, haciendo pull ==="
            cd m3motors
            git fetch origin main
            git reset --hard origin/main
            git clean -fd
          else
            echo "=== Clonando repo por primera vez ==="
            rm -rf m3motors
            git clone --branch main https://github.com/naturemat/m3motors.git
            cd m3motors
          fi

          echo "=== Repo actualizado ==="
          git log -1 --oneline
          CLONE_SCRIPT

      - name: Create .env en Droplet
        run: |
          ssh -i ~/.ssh/deploy_key ${{ env.DO_USERNAME }}@${{ env.DO_HOST }} "cat > ${{ env.DEPLOY_PATH }}/.env" <<'ENVEOF'
          # === Docker ===
          DOCKERHUB_USERNAME=${{ secrets.DOCKERHUB_USERNAME }}
          # === Backend ===
          APP_PORT=3000
          NODE_ENV=production
          DATABASE_URL=${{ secrets.DATABASE_URL }}
          DIRECT_URL=${{ secrets.DIRECT_URL }}
          CLERK_SECRET_KEY=${{ secrets.CLERK_SECRET_KEY }}
          CLERK_ISSUER_URL=${{ secrets.CLERK_ISSUER_URL }}
          CLERK_WEBHOOK_SECRET=${{ secrets.CLERK_WEBHOOK_SECRET }}
          JWT_SECRET=${{ secrets.JWT_SECRET }}
          JWT_EXPIRES_IN=${{ secrets.JWT_EXPIRES_IN }}
          LLM_API_KEY=${{ secrets.LLM_API_KEY }}
          LLM_MODEL=${{ secrets.LLM_MODEL }}
          GEMINI_API_KEY=${{ secrets.GEMINI_API_KEY }}
          GROQ_API_KEY=${{ secrets.GROQ_API_KEY }}
          RESEND_API_KEY=${{ secrets.RESEND_API_KEY }}
          RESEND_FROM_EMAIL=${{ secrets.RESEND_FROM_EMAIL }}
          ONESIGNAL_APP_ID=${{ secrets.ONESIGNAL_APP_ID }}
          ONESIGNAL_REST_API_KEY=${{ secrets.ONESIGNAL_REST_API_KEY }}
          REDIS_HOST=redis
          REDIS_PORT=6379
          NOTIFICATION_ENABLED=true
          NOTIFICATION_MAX_RETRIES=3
          NOTIFICATION_RETRY_DELAY_MS=5000
          LOG_LEVEL=${{ secrets.LOG_LEVEL }}
          CORS_ORIGIN=${{ secrets.CORS_ORIGIN }}
          SUPABASE_URL=${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY=${{ secrets.SUPABASE_ANON_KEY }}
          SUPABASE_SERVICE_ROLE_KEY=${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          SUPABASE_STORAGE_BUCKET=${{ secrets.SUPABASE_STORAGE_BUCKET }}
          RECAPTCHA_SECRET=${{ secrets.RECAPTCHA_SECRET }}
          QR_BASE_URL=${{ secrets.QR_BASE_URL }}
          TELEGRAM_BOT_TOKEN=${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_BOT_USERNAME=${{ secrets.TELEGRAM_BOT_USERNAME }}
          MCP_SERVER_URL=${{ secrets.MCP_SERVER_URL }}
          ENVEOF

      - name: Deploy via SSH
        run: |
          ssh -i ~/.ssh/deploy_key ${{ env.DO_USERNAME }}@${{ env.DO_HOST }} <<'DEPLOY_SCRIPT'
          set -e
          cd /opt/m3motors

          echo "=== [1/5] Limpiar contenedores viejos ==="
          docker stop $(docker ps -aq --filter "name=m3motors-") 2>/dev/null || true
          docker rm $(docker ps -aq --filter "name=m3motors-") 2>/dev/null || true

          echo "=== [2/5] Limpiar imagenes no utilizadas ==="
          docker image prune -af --filter "until=72h" 2>/dev/null || true

          echo "=== [3/5] Limpiar logs antiguos de contenedores ==="
          find /var/lib/docker/containers -name "*-json.log" -size +50M -delete 2>/dev/null || true

          echo "=== [4/5] Descargar e iniciar servicios ==="
          docker compose -f docker-compose.prod.yml --env-file .env pull
          docker compose -f docker-compose.prod.yml --env-file .env up -d

          echo "=== [5/5] Verificar estado ==="
          sleep 10
          docker compose -f docker-compose.prod.yml ps

          echo "=== Deploy completado ==="
          DEPLOY_SCRIPT

      - name: Download APK artifact
        if: needs.build-frontend-mobile.result == 'success'
        uses: actions/download-artifact@v4
        with:
          name: m3motors-mobile-apk
          path: ./apk

      - name: Upload APK to Droplet
        if: needs.build-frontend-mobile.result == 'success'
        run: |
          ssh -i ~/.ssh/deploy_key ${{ env.DO_USERNAME }}@${{ env.DO_HOST }} "mkdir -p ${{ env.DEPLOY_PATH }}/apk"
          scp -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no ./apk/*.apk ${{ env.DO_USERNAME }}@${{ env.DO_HOST }}:${{ env.DEPLOY_PATH }}/apk/

      - name: Cleanup SSH key
        if: always()
        run: rm -rf ~/.ssh/deploy_key
