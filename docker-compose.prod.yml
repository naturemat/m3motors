services:
  postgres:
    image: postgres:16
    container_name: m3motors-postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: m3motors
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infrastructure/database/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d m3motors"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - m3motors-network

  backend:
    image: ${DOCKERHUB_USERNAME}/m3motors-backend:latest
    container_name: m3motors-backend
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: production
      APP_PORT: 3000
      DATABASE_URL: postgresql://postgres:${DB_PASSWORD}@postgres:5432/m3motors?schema=public
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-7d}
      LLM_API_KEY: ${LLM_API_KEY}
      LLM_MODEL: ${LLM_MODEL:-gpt-4}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost}
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - m3motors-network

  frontend:
    image: ${DOCKERHUB_USERNAME}/m3motors-frontend:latest
    container_name: m3motors-frontend
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - m3motors-network

volumes:
  postgres_data:
    name: m3motors_postgres_data
    driver: local

networks:
  m3motors-network:
    name: m3motors-network
    driver: bridge
