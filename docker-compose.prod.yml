services:
  redis:
    image: redis:7-alpine
    container_name: m3motors-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - m3motors-network

  backend:
    image: ${DOCKERHUB_USERNAME}/m3motors-backend:latest
    container_name: m3motors-backend
    restart: unless-stopped
    ports:
      - "3000:3000"
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:3000/health"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s
    environment:
      NODE_ENV: production
      APP_PORT: 3000
      DATABASE_URL: ${DATABASE_URL}
      DIRECT_URL: ${DIRECT_URL}
      CLERK_SECRET_KEY: ${CLERK_SECRET_KEY}
      CLERK_ISSUER_URL: ${CLERK_ISSUER_URL}
      CLERK_WEBHOOK_SECRET: ${CLERK_WEBHOOK_SECRET}
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-7d}
      GEMINI_API_KEY: ${GEMINI_API_KEY}
      GROQ_API_KEY: ${GROQ_API_KEY}
      RESEND_API_KEY: ${RESEND_API_KEY}
      RESEND_FROM_EMAIL: ${RESEND_FROM_EMAIL}
      ONESIGNAL_APP_ID: ${ONESIGNAL_APP_ID}
      ONESIGNAL_REST_API_KEY: ${ONESIGNAL_REST_API_KEY}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      LOG_LEVEL: ${LOG_LEVEL:-info}
      CORS_ORIGIN: ${CORS_ORIGIN}
      SUPABASE_URL: ${SUPABASE_URL}
      SUPABASE_ANON_KEY: ${SUPABASE_ANON_KEY}
      SUPABASE_SERVICE_ROLE_KEY: ${SUPABASE_SERVICE_ROLE_KEY}
      SUPABASE_STORAGE_BUCKET: ${SUPABASE_STORAGE_BUCKET:-m3motors-photos}
      RECAPTCHA_SECRET: ${RECAPTCHA_SECRET}
      QR_BASE_URL: ${QR_BASE_URL}
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - m3motors-network

  frontend:
    image: ${DOCKERHUB_USERNAME}/m3motors-frontend:latest
    container_name: m3motors-frontend
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - /opt/m3motors/apk:/usr/share/nginx/html/apk:ro
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - m3motors-network

networks:
  m3motors-network:
    name: m3motors-network
    driver: bridge
