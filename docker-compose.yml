services:
  postgres:
    image: postgres:16
    container_name: m3motors-postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: m3motors
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d m3motors"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 15s
    networks:
      - m3motors-network

  redis:
    image: redis:7-alpine
    container_name: m3motors-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - m3motors-network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.dev
    container_name: m3motors-backend
    restart: unless-stopped
    ports:
      - "3000:3000"
    env_file:
      - ./backend/.env
    environment:
      NODE_ENV: development
      APP_PORT: 3000
      CORS_ORIGIN: http://localhost:5173
    volumes:
      - ./backend/src:/app/src
      - ./backend/package.json:/app/package.json
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    networks:
      - m3motors-network

  frontend:
    build:
      context: ./frontend/web
      dockerfile: Dockerfile.dev
    container_name: m3motors-frontend
    restart: unless-stopped
    ports:
      - "5173:5173"
    environment:
      NODE_ENV: development
      VITE_API_URL: http://localhost:3000
      VITE_NODE_ENV: development
    volumes:
      - ./frontend/web/src:/app/src
      - ./frontend/web/package.json:/app/package.json
      - ./frontend/web/index.html:/app/index.html
      - ./frontend/web/vite.config.ts:/app/vite.config.ts
    depends_on:
      - backend
    networks:
      - m3motors-network

volumes:
  postgres_data:
    name: m3motors_postgres_data
    driver: local

networks:
  m3motors-network:
    name: m3motors-network
    driver: bridge
