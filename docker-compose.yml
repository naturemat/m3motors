services:
  postgres:
    image: postgres:16
    container_name: m3motors-postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: m3motors
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infrastructure/database/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d m3motors"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 15s
    networks:
      - m3motors-network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.dev
    container_name: m3motors-backend
    restart: unless-stopped
    ports:
      - "3000:3000"
    env_file:
      - ./backend/.env
    environment:
      NODE_ENV: development
      APP_PORT: 3000
      CORS_ORIGIN: http://localhost:5173
    volumes:
      - ./backend/src:/app/src
      - ./backend/package.json:/app/package.json
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - m3motors-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    container_name: m3motors-frontend
    restart: unless-stopped
    ports:
      - "5173:5173"
    environment:
      NODE_ENV: development
      VITE_API_URL: http://localhost:3000
      VITE_NODE_ENV: development
      VITE_TELEGRAM_BOT_USERNAME: m3motors_bot
      VITE_SUPABASE_URL: ${SUPABASE_URL}
      VITE_SUPABASE_ANON_KEY: ${SUPABASE_ANON_KEY}
    volumes:
      - ./frontend/src:/app/src
      - ./frontend/package.json:/app/package.json
      - ./frontend/index.html:/app/index.html
      - ./frontend/vite.config.ts:/app/vite.config.ts
    depends_on:
      - backend
    networks:
      - m3motors-network

volumes:
  postgres_data:
    name: m3motors_postgres_data
    driver: local

networks:
  m3motors-network:
    name: m3motors-network
    driver: bridge
